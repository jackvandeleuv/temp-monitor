<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal KPIs</title>
    <link
        rel="icon"
        id="headerLink"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>😻</text></svg>"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body id="body">
    <div id="loaderWrapper">
        <span class="loader">
        </span>
    </div>
    <div id="headerBox">
        <div>
            <h2>Urban AI</h2>
            <h4>Thermal KPIs</h4>
        </div>
        <div id="emojiBox">
            <h2 title="Dew Point" id="dewEmoji" class="emoji"></h2>
            <h2 title="Temperature" id="tempEmoji" class="emoji"></h2>
        </div>
    </div>

    <div id="statBoxes">
        <div class="statBox">
            <p class="statBoxVal"><span id="temp"></span>°F</p>
            <p>Temp</p>
        </div>
        <div title="Dew Point is a combined measure of temperature and humidity." class="statBox">
            <p class="statBoxVal"><span id="dewPoint"></span>°F</p>
            <p>Dew Point</p>
        </div>
        <div class="statBox">
            <p class="statBoxVal"><span id="humidity"></span>%</p>
            <p>Humidity</p>
        </div>
    </div>

    <div id="selectBox">
        <select id="metric">
            <option value="tempF">Temp (°F)</option>
            <option value="dewPoint">Dew Point</option>
            <option value="humidity">Humidity</option>
        </select>
        <div id="updatedBox">
            <span>Updated:</span>
            <span id="lastUpdatedVal"></span>
        </div>
    </div>

    <div id="chartWrapper">
        <canvas id="chart"></canvas>
    </div>

    <script type="module" src="scripts/main.js"></script>
</body>
</html>
